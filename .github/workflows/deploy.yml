name: Deploy

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        # supabase db push is idempotent — already-applied migrations are skipped.
        # SUPABASE_DB_URL format: postgresql://postgres:<password>@db.<project-ref>.supabase.co:5432/postgres
        # Set this secret in: GitHub repo → Settings → Secrets and variables → Actions
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

